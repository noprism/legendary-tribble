<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Metrostroi Transit Authority - OS Dashboard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>
    <div class="aurora-wave"></div>
    
    <div class="bubble-wrapper wrapper1">
        <div class="bubble-orb orb1"></div>
    </div>
    <div class="bubble-wrapper wrapper2">
        <div class="bubble-orb orb2"></div>
    </div>

    <div class="app-window">
        
        <div class="app-header">
            <div class="app-title-group">
                <div class="app-icon"></div>
                <span class="app-title-text">Metrostroi Systemkonfiguration & Infocenter</span>
            </div>
            <div class="window-controls">
                <div class="win-btn win-min"></div>
                <div class="win-btn win-max"></div>
                <div class="win-btn win-close"></div>
            </div>
        </div>

        <div class="app-body">
            
            <div class="main-panel">
                <h2 class="section-title">
                    <span id="train-title" style="color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.3);">Lade...</span> 
                    <span id="train-diff-badge" style="margin-left: 10px;"></span>
                </h2>
                <div style="font-size: 1.05rem; color: #f0f9ff; font-weight: 600; margin-bottom: 15px; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">
                    Betriebs-Modus: <span id="train-state" style="color: #00f2fe; text-transform: uppercase;">Lade...</span>
                </div>
                
                <div class="checklist-container" id="checklist-container">
                    </div>
            </div>

            <div class="sidebar-panel">
                
                <div class="sidebar-gadget music-gadget">
                    <span class="gadget-label">Aero Media Player</span>
                    <div class="music-info">
                        <span class="music-title" id="track-title">Warte...</span>
                        <span class="music-artist" id="track-artist">Solar Fields</span>
                        <canvas id="vis-canvas" width="220" height="35"></canvas>
                    </div>
                    <div class="music-progress-container">
                        <div class="music-progress-bar" id="track-progress"></div>
                    </div>
                </div>

                <div class="sidebar-gadget status-gadget">
                    <span class="gadget-label">System-Status</span>
                    <div class="diagnostics-box">
                        <div class="diag-row">
                            <span class="diag-label">Streckensektor:</span>
                            <span class="diag-value" id="map-name">Lade...</span>
                        </div>
                        <div class="diag-row">
                            <span class="diag-label">Signalsystem:</span>
                            <span class="diag-value" style="color: #38b000; font-weight: bold;">ALS-ARS READY</span>
                        </div>
                        <div class="diag-row">
                            <span class="diag-label">Daten-Pool:</span>
                            <span class="diag-value">Wiki Sync v3</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="app-taskbar">
            <div class="progress-container">
                <div class="progress-bar" id="load-progress"></div>
            </div>
            <div class="status-layout">
                <div id="status-text">Systeme werden initialisiert...</div>
                <div id="current-file">Verbindung wird aufgebaut...</div>
            </div>
        </div>

    </div>

    <script>
        // 1. GMOD PARAMETER ABGREIFEN
        const urlParams = new URLSearchParams(window.location.search);
        const mapName = urlParams.get('mapname');
        if (mapName) document.getElementById('map-name').innerText = mapName;

        // 2. ERWEITERTER POOL MIT TRAIN STATES (Akkurate Prozeduren aus deinen Wiki-Quelltexten)
        const trainPool = [
            {
                title: "Baureihe 81-717 (Номерной)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Batterien & Hauptautomaten", desc: "Schalte an der Cockpit-Rückwand die Automaten <span class='key-badge'>A49</span>, <span class='key-badge'>A53</span> und <span class='key-badge'>AP-63</span> hoch[cite: 16]. Aktiviere darunter den Batterie-Hauptschalter (Spannung ≥62 V prüfen)[cite: 15, 16]." },
                    { title: "Sicherungskontrolle", desc: "Schalte den Funk-Verstärker (УНЧ) und den Radioansager ein[cite: 16]. Kontrolliere das Vorhandensein der Sicherheitsplomben an <span class='key-badge'>UAVA</span> und <span class='key-badge'>ARS-RC</span>[cite: 17, 18]." },
                    { title: "Pneumatik-Handshake", desc: "Öffne das Absperrventil mit <span class='key-badge'>Shift + L</span> (blauer Hebel springt hoch)[cite: 19]. Bringe das rote Bremsventil in Fahrtstellung (<span class='key-badge'>Num 2</span>) und lade die Leitung auf 5 Bar auf[cite: 19]." },
                    { title: "Hochspannung zuschalten", desc: "Schalte außen am Zug den Trennschalter <span class='key-badge'>GV</span> ein[cite: 21]. Verbinde das Hallen-Stromkabel (Udočka) mit dem Stromabnehmer des 2. Wagens, um 825V aufzuschalten[cite: 15, 26]." }
                ]
            },
            {
                title: "Baureihe 81-717 (Номерной)",
                state: "Wendeanlage & Kehrgleis",
                difficulty: "Mittel",
                diffColor: "#f59e0b",
                steps: [
                    { title: "Fahrgasträumung", desc: "Nach Ankunft an der Endstation kontrollierst du die ersten beiden Wagen auf Fahrgäste  und schließt die Türen mit <span class='key-badge'>V</span>[cite: 181]. Fahre per Signal in das Kehrgleis ein[cite: 183]." },
                    { title: "Kabinen-Deaktivierung", desc: "Bringe das Bremsventil in Vollbremsung (PST), schließe die Trennhähne (<span class='key-badge'>Shift + L</span>), stelle den Reverser auf Null (<span class='key-badge'>9</span>) und ziehe ihn ab (<span class='key-badge'>Shift + 7</span>)[cite: 185, 186, 187]." },
                    { title: "Interieur-Inspektion", desc: "Sperre die Kabinentür mit dem Dreikantschlüssel ab[cite: 187]. Gehe durch die Wagons zur entgegengesetzten Zugspitze und überprüfe dabei Feuerlöscher und Türschwellen[cite: 188]." },
                    { title: "Gegenseite aufrüsten", desc: "In der neuen Frontkabine: Sobald das manuelle Rangiersignal auf 'Erlaubt' springt, richtest du die Kabine ein (Reverser vorwärts, Ventile auf, ARS an) und fährst zum Bahnsteig[cite: 189, 191]." }
                ]
            },
            {
                title: "Baureihe 81-710 (Ezh3)",
                state: "Inbetriebnahme nach Nachtabstellung",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Erwachen auf der Strecke", desc: "Schalte im finsteren Abstellgleis den Batterie-Hauptschalter und das Notlicht ein[cite: 102, 105]. Aktiviere den Sicherungsautomaten <span class='key-badge'>AV-8A</span> sowie das Funkgerät[cite: 102]." },
                    { title: "Zwischenwagen-Check", desc: "Wandere durch die Wagons zur Heckkabine. Schalte in jedem Wagon die Batterie ein, prüfe den Bremszylinderdruck (2.2 - 2.4 Bar) und kontrolliere die Handbremsen[cite: 105, 106]." },
                    { title: "Heck-Konfiguration", desc: "Öffne in der Heckkabine die Trennhähne, lade die Hauptleitung auf 5 Bar im Fahrtstellung-Modus (Stufe II) und aktiviere das ARS-System (Klingelton per <span class='key-badge'>Leertaste</span> quittieren)[cite: 110, 111, 113]." },
                    { title: "Rollfähigkeits-Prüfung", desc: "Kehre in die Front zurück, öffne die Ventile, schalte ARS ein[cite: 118, 119]. Prüfe die Rollfähigkeit (Nakat) mit Fahrstufe <span class='key-badge'>X1</span>, um das automatische Zurückrollen (Protiwoskatywanije) zu blockieren[cite: 227, 228, 229]." }
                ]
            },
            {
                title: "Baureihe 81-722 (Юбилейный)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Bordnetz booten", desc: "Halte an der Cockpit-Rückwand die Taste <span class='key-badge'>Включение БС</span> für 3-5 Sekunden gedrückt, bis die Displays hochfahren[cite: 324]. Aktiviere alle Sicherungsautomaten[cite: 324]." },
                    { title: "MFDU-Anmeldung", desc: "Tippe auf dem Touch-Display (MFDU) auf 'Aktivieren' (leuchtet blau)[cite: 326]. Konfiguriere Route, Linie und Fahrernummer über die Funktionstasten <span class='key-badge'>F1</span> und <span class='key-badge'>F2</span>[cite: 325, 328]." },
                    { title: "BARS-Zwangsbremsung lösen", desc: "Reverser vorwärts (<span class='key-badge'>0</span>)[cite: 330]. Falls der BARS-Computer blockiert (Luft zischt), stelle den Reverser kurz auf Null (<span class='key-badge'>9</span>), starte das ARS am Kippschalter neu und schalte wieder auf Vorwärts (<span class='key-badge'>0</span>)[cite: 330, 331]." },
                    { title: "Sicherheits-Pedalsperre", desc: "<strong>Wichtig:</strong> Halte vor dem Anfahren zwingend die Sicherheits-Pedalerie (<span class='key-badge'>Shift + Leertaste</span>) gedrückt, da der Zug sonst trotz gewählter Fahrstufe absolut blockiert[cite: 278, 280]." }
                ]
            },
            {
                title: "Baureihe 81-720 (Яуза)",
                state: "Vollständig fahrbereit",
                difficulty: "Einfach",
                diffColor: "#38b000",
                steps: [
                    { title: "Zentralanmeldung", desc: "Da der Zug bereits fahrbereit spawnt, setzt du dich auf den Fahrersitz und gibst am 'Витязь'-Computer das Standardpasswort <span class='key-badge'>1234</span> ein (<span class='key-badge'>Alt + Numpad</span>)[cite: 296, 302]." },
                    { title: "Verband verifizieren", desc: "Stecke den Reverser mit <span class='key-badge'>Shift + 0</span> ein und lege ihn auf Vorwärts (<span class='key-badge'>0</span>)[cite: 302]. Bestätige die angezeigte Wagonanzahl am Monitor mit der Taste <span class='key-badge'>Ввод</span>[cite: 303]." },
                    { title: "Aggregate zuschalten", desc: "Aktiviere auf der rechten Schalterkonsole (PME) den Kompressor (MK), den statischen Umformer (PSN) sowie die Fahrgastraumbeleuchtung und Scheinwerfer[cite: 305]." },
                    { title: "Schnellschalter & Abfahrt", desc: "Drücke <span class='key-badge'>G</span>, um den elektronischen Schnellschalter (BV) einzulegen[cite: 308]. Schließe die Türen über das 'Витязь'-Menü und bewege den Fahrhebel (<span class='key-badge'>W</span>) sanft nach vorne[cite: 309]." }
                ]
            }
        ];

        // Würfel-Logik ausführen
        const randomSelection = trainPool[Math.floor(Math.random() * trainPool.length)];
        document.getElementById("train-title").innerText = randomSelection.title;
        document.getElementById("train-state").innerText = randomSelection.state;
        
        const diffBadge = document.getElementById("train-diff-badge");
        diffBadge.innerText = randomSelection.difficulty;
        diffBadge.className = "key-badge";
        diffBadge.style.background = `linear-gradient(to bottom, #ffffff 0%, ${randomSelection.diffColor} 100%)`;
        diffBadge.style.color = "#ffffff";
        diffBadge.style.textShadow = "0 1px 2px rgba(0,0,0,0.5)";
        diffBadge.style.borderColor = randomSelection.diffColor;

        const checklistContainer = document.getElementById("checklist-container");
        checklistContainer.innerHTML = "";
        randomSelection.steps.forEach((step, i) => {
            checklistContainer.innerHTML += `
                <div class="check-item">
                    <div class="check-box-glow" style="background: linear-gradient(to bottom, #b5e2fa 0%, ${randomSelection.diffColor} 100%);"><div class="check-mark"></div></div>
                    <div class="check-content">
                        <h3>Schritt ${i+1}: ${step.title}</h3>
                        <p>${step.desc}</p>
                    </div>
                </div>
            `;
        });

        // 3. PLAYLIST & AUDIO ENGINE
        const playlist = [
            { path: "music/kate.mp3", title: "Kate", artist: "Solar Fields" },
            { path: "music/still-alive.mp3", title: "Still Alive", artist: "Lisa Miskovsky / Solar Fields" },
            { path: "music/heat.mp3", title: "Heat", artist: "Solar Fields" },
            { path: "music/menu-theme.mp3", title: "Menu Theme", artist: "Solar Fields" }
        ];

        const audio = document.getElementById("loading-music");
        let lastTrackIndex = -1;
        let audioCtx, analyser, source, bufferLength, dataArray;
        let isAudioSetup = false;

        function initAudioReactor() {
            if (isAudioSetup) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioSetup = true;
                renderAudioReaction();
            } catch(e) { console.log("Audio Engine wartet."); }
        }

        function playRandomSong() {
            if (playlist.length === 0) return;
            let newIndex = lastTrackIndex;
            if (playlist.length > 1) {
                while (newIndex === lastTrackIndex) {
                    newIndex = Math.floor(Math.random() * playlist.length);
                }
            } else { newIndex = 0; }
            lastTrackIndex = newIndex;
            const currentSong = playlist[newIndex];
            audio.src = currentSong.path;
            audio.volume = 0.15; 
            document.getElementById("track-title").innerText = currentSong.title;
            document.getElementById("track-artist").innerText = currentSong.artist;
            document.getElementById("track-progress").style.width = "0%";
            audio.play().then(() => { initAudioReactor(); }).catch(e => {});
        }

        function renderAudioReaction() {
            requestAnimationFrame(renderAudioReaction);
            if (!isAudioSetup) return;
            analyser.getByteFrequencyData(dataArray);
            let bass = 0;
            for(let i = 0; i < 4; i++) { bass += dataArray[i]; }
            bass = bass / 4;
            document.body.style.setProperty('--audio-bass', bass / 255);

            const canvas = document.getElementById("vis-canvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = (canvas.width / bufferLength) * 1.4;
            let barHeight, x = 0;
            for(let i = 0; i < bufferLength; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height;
                let grad = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                grad.addColorStop(0, 'rgba(0, 119, 182, 0.8)');
                grad.addColorStop(0.6, 'rgba(0, 242, 254, 0.9)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0.9)');
                ctx.fillStyle = grad;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 3, barHeight);
                x += barWidth;
            }
        }

        window.addEventListener('click', () => {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            initAudioReactor();
        });
        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                document.getElementById("track-progress").style.width = ((audio.currentTime / audio.duration) * 100) + "%";
            }
        });
        audio.addEventListener('ended', playRandomSong);
        playRandomSong();

        // Gmod Ladebalken-Schnittstellen
        let totalFiles = 0, neededFiles = 0;
        function SetStatusChanged(status) { document.getElementById("status-text").innerText = status; }
        function SetFilesTotal(total) { if (total > totalFiles) totalFiles = total; }
        function SetFilesNeeded(needed) {
            neededFiles = needed;
            if (neededFiles > totalFiles) totalFiles = neededFiles;
            if (totalFiles > 0) {
                let percentage = Math.max(0, Math.min(100, ((totalFiles - neededFiles) / totalFiles) * 100));
                document.getElementById("load-progress").style.width = percentage + "%";
            }
        }
        function DownloadingFile(fileName) { document.getElementById("current-file").innerText = "Datenstrom: " + fileName; }
    </script>
</body>
</html>
