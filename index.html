<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    img {
      border-radius: 50%;
      width: 120px;
      height: 120px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .info {
      opacity: 0.8;
      font-size: 14px;
    }

    .progress {
      margin-top: 20px;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      animation: load 10s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="avatar" src="" alt="Avatar">
    <h1 id="welcome">Lade...</h1>
    <div class="info" id="serverInfo"></div>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const steamid = params.get("steamid") || params.get("steamid64");
    const map = params.get("map");
    const hostname = params.get("hostname");
    const gamemode = params.get("gamemode");

    const welcomeEl = document.getElementById("welcome");
    const avatarEl = document.getElementById("avatar");
    const serverInfoEl = document.getElementById("serverInfo");

    serverInfoEl.innerHTML = `
      Server: ${hostname || "Unbekannt"}<br>
      Map: ${map || "Unbekannt"}<br>
      Modus: ${gamemode || "Unbekannt"}
    `;

    if (steamid) {
      const apiKey = "3EABCBFA61D44CB29354BA0AEA4F797B"; // <-- HIER EINTRAGEN

      fetch(`https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v2/?key=${apiKey}&steamids=${steamid}`)
        .then(res => res.json())
        .then(data => {
          const player = data.response.players[0];

          if (player) {
            welcomeEl.textContent = `Willkommen, ${player.personaname}`;
            avatarEl.src = player.avatarfull;
          } else {
            welcomeEl.textContent = "Willkommen Spieler";
          }
        })
        .catch(() => {
          welcomeEl.textContent = "Willkommen Spieler";
        });
    } else {
      welcomeEl.textContent = "Willkommen Spieler";
    }
  </script>
</body>
</html>
