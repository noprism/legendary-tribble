<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Metrostroi Transit Authority - Control Center</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>
    <div class="aurora-wave"></div>
    
    <div class="bubble-wrapper wrapper1">
        <div class="bubble-orb orb1"></div>
    </div>
    <div class="bubble-wrapper wrapper2">
        <div class="bubble-orb orb2"></div>
    </div>

    <div class="app-window">
        
        <div class="app-header">
            <div class="app-title-group">
                <div class="app-icon"></div>
                <span class="app-title-text">Metrostroi Systemkonfiguration & Inbetriebnahme</span>
            </div>
            <div class="window-controls">
                <div class="win-btn win-min"></div>
                <div class="win-btn win-max"></div>
                <div class="win-btn win-close"></div>
            </div>
        </div>

        <div class="app-body">
            
            <div class="main-panel">
                <h2 class="section-title">
                    <span id="train-title" style="color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.3);">Lade...</span> 
                    <span id="train-diff-badge" style="margin-left: 10px;"></span>
                </h2>
                <div style="font-size: 1.05rem; color: #f0f9ff; font-weight: 600; margin-bottom: 15px; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">
                    Betriebs-Modus: <span id="train-state" style="color: #00f2fe; text-transform: uppercase;">Lade...</span>
                </div>
                
                <div class="checklist-container" id="checklist-container">
                    </div>
            </div>

            <div class="sidebar-panel">
                
                <div class="sidebar-gadget music-gadget">
                    <span class="gadget-label">Aero Media Player</span>
                    <div class="music-info">
                        <span class="music-title" id="track-title">Lade Titel...</span>
                        <span class="music-artist" id="track-artist">System</span>
                        <canvas id="vis-canvas" width="220" height="35"></canvas>
                    </div>
                    <div class="music-progress-container">
                        <div class="music-progress-bar" id="track-progress"></div>
                    </div>
                </div>

                <div class="sidebar-gadget status-gadget">
                    <span class="gadget-label">System-Status</span>
                    <div class="diagnostics-box">
                        <div class="diag-row">
                            <span class="diag-label">Streckensektor:</span>
                            <span class="diag-value" id="map-name">Lade...</span>
                        </div>
                        <div class="diag-row">
                            <span class="diag-label">Signalsystem:</span>
                            <span class="diag-value" style="color: #38b000; font-weight: bold;">DEPOT-SYNC</span>
                        </div>
                        <div class="diag-row">
                            <span class="diag-label">Daten-Pool:</span>
                            <span class="diag-value">Wiki Strict v4</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="app-taskbar">
            <div class="progress-container">
                <div class="progress-bar" id="load-progress"></div>
            </div>
            <div class="status-layout">
                <div id="status-text">Garry's Mod Ressourcen werden abgeglichen...</div>
                <div id="current-file">Warte auf Server-Handshake...</div>
            </div>
        </div>

    </div>

    <audio id="loading-music"></audio>

    <script>
        // Gmod Parameter abgreifen
        const urlParams = new URLSearchParams(window.location.search);
        const mapName = urlParams.get('mapname');
        if (mapName) document.getElementById('map-name').innerText = mapName;

        // ----------------------------------------------------
        // FAKTENBASIERTER TRAIN POOL (STRICT WIKI DATA)
        // ----------------------------------------------------
        const trainPool = [
            {
                title: "Baureihe Ezh3 (81-710)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Netz & Kontrolle", desc: "Überprüfen, dass kein 825V anliegt und die Udočka vom Stromabnehmer getrennt ist. In Frontkabine: Absperrhähne (НМ/ТМ) öffnen, Druck prüfen (TM 5.0-5.2 atm, NM ≥ 6 atm)." },
                    { title: "Systeme booten", desc: "Batterie und Automat АВ-8А einschalten. Funkgerät einschalten. Reverser vorwärts. Vollbremsung einleiten, Hähne schließen, Bremsventil auf Pos I, Reverser abziehen." },
                    { title: "Wagen-Check", desc: "Durch den Zug gehen: Batterien und АВ-8А in jedem Wagen zuschalten. In Heckkabine: Batterie an, Hähne auf, Bremsventil Pos II. Reverser vor, ARS an, Klingel abwarten, EPK-Kran auf." },
                    { title: "Abfahrt", desc: "In Frontkabine: Hähne auf, Pos II. ARS an, Reverser vor. GV einschalten. Nach Udočka-Anschluss mit 'Ход-1' anrollen und max. 5 km/h fahren." }
                ]
            },
            {
                title: "Baureihe 81-717 (Номерной)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Zentralelektrik", desc: "Sicherstellen, dass der Zug von Hochspannung getrennt ist. In Frontkabine Batterie (≥62 V), АР-63, А-53, А-49, УНЧ, Funk und Ansager einschalten." },
                    { title: "Luftleitung & ASNP", desc: "ASNP einrichten und Signaltaste testen. Rast-Hahn öffnen (Num 0), Bremsventil auf Pos 2, auf 5 Bar laden. Vollbremsung, Hahn zu, Batterie aus." },
                    { title: "Rundgang & Heck", desc: "In Zwischenwagen Batterien einschalten. In Heckkabine: Hähne auf, Pos 2. Batterie, АР-63, А-53, А-49 an. Reverser vor, Tür auf, Reverser abziehen." },
                    { title: "Ausfahrt", desc: "In Frontkabine Batterie an, 'Возврат РП' 2-3 Sek drücken. Außen ГВ einschalten. ARS an, Pedale drücken. Ausfahrt mit Udočka bis Schild 'STOP' bei max. 5 km/h." }
                ]
            },
            {
                title: "Baureihe 81-502 (Ema-502)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Mittel",
                diffColor: "#f59e0b",
                steps: [
                    { title: "Kabine einrichten", desc: "In Frontkabine Batterie und Hochspannungsautomat einschalten. Plomben an ВРУ, КАХ, КАД etc. prüfen. ВКФ einschalten." },
                    { title: "Tests durchführen", desc: "Reverser vorwärts. VUD entsperren, linke Türen öffnen. Reverser neutral und abziehen. VUD sperren." },
                    { title: "Heck-Aufrüstung", desc: "In Zwischenwagen Batterien/Hochspannung an. Heckkabine: Batterie, Hochspannung, ВПР, УПО an. Reverser vor, Hähne auf, Vollbremsung." },
                    { title: "Sicherheitspedale", desc: "Frontkabine: СОСД, ВПР, УПО an. Reverser vor. Hauptschalter ГВ an. Auf KVL-Zügen vor der Ausfahrt zwingend Sicherheitspedale (Shift+Leertaste) halten!" }
                ]
            },
            {
                title: "Baureihe 81-720 (Яуза)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Vityaz Bootvorgang", desc: "Batterie und Automaten auf Панель поездной защиты einschalten. Zwischenwagen Batterien an. Frontkabine: Vityaz Passwort 1234 eingeben." },
                    { title: "Wagen-Verwaltung", desc: "Reverser vorwärts. Im Vityaz Menü 'Номера вагонов' prüfen und mit Ввод (Enter) bestätigen. Auf ПМВ: Kompressor, ПСН, Licht, Scheinwerfer, Ventilation an." },
                    { title: "Bremsen testen", desc: "Reserve-Bremse via Num 9 aktivieren, 3 Stufen testen. РВТБ Notbremse prüfen. K-29 öffnen, КМ auf Pos 2." },
                    { title: "Türkreise", desc: "Schnellschalter (БВ) mit Taste G einschalten. Vityaz-2 Modus 'Двери' aktivieren und Türen testen. Außen ГВ einschalten und ausfahren." }
                ]
            },
            {
                title: "Baureihe 81-722 (Юбилейный)",
                state: "Kaltstart im Betriebshof",
                difficulty: "Schwer",
                diffColor: "#ef4444",
                steps: [
                    { title: "Netz aufschalten", desc: "Sicherstellen, dass kein 825V anliegt. Taste 'Включение БС' 3-5 Sek gedrückt halten. Automaten an. Salonlicht an, Ventilation auf АВТ." },
                    { title: "Computer einrichten", desc: "ARS, ALS, Scheinwerfer, Kompressoren an. MFDU-Display: 'Активировать' drücken, OK bestätigen. Route auf БМЦИК-01 einstellen." },
                    { title: "BARS-Zwangsbremse", desc: "Reverser vorwärts. Bei roter BARS-Fehlermeldung (Экстренное торможение БАРС): Reverser 0, ARS aus, Klingel abwehren, ARS an, Reverser vor." },
                    { title: "Traktion entsperren", desc: "Spannung prüfen. Zum Anfahren Sicherheitspedale zwingend gedrückt halten, Leistung auf 20% stellen und mit max. 5 km/h bis STOP-Schild fahren." }
                ]
            }
        ];

        // Zufälliges Modell auswürfeln
        const randomSelection = trainPool[Math.floor(Math.random() * trainPool.length)];
        document.getElementById("train-title").innerText = randomSelection.title;
        document.getElementById("train-state").innerText = randomSelection.state;
        
        const diffBadge = document.getElementById("train-diff-badge");
        diffBadge.innerText = randomSelection.difficulty;
        diffBadge.className = "key-badge";
        diffBadge.style.background = `linear-gradient(to bottom, #ffffff 0%, ${randomSelection.diffColor} 100%)`;
        diffBadge.style.color = "#ffffff";
        diffBadge.style.textShadow = "0 1px 2px rgba(0,0,0,0.5)";
        diffBadge.style.borderColor = randomSelection.diffColor;

        const checklistContainer = document.getElementById("checklist-container");
        checklistContainer.innerHTML = "";
        randomSelection.steps.forEach((step, i) => {
            checklistContainer.innerHTML += `
                <div class="check-item">
                    <div class="check-box-glow" style="background: linear-gradient(to bottom, #b5e2fa 0%, ${randomSelection.diffColor} 100%);"><div class="check-mark"></div></div>
                    <div class="check-content">
                        <h3>Schritt ${i+1}: ${step.title}</h3>
                        <p>${step.desc}</p>
                    </div>
                </div>
            `;
        });

        // ----------------------------------------------------
        // KORRIGIERTER AUDIO PLAYER (Pfade + robustes Playback)
        // ----------------------------------------------------
        const playlist = [
            { path: "music/kate.mp3", title: "Kate", artist: "Solar Fields" },
            { path: "music/still-alive.mp3", title: "Still Alive", artist: "Lisa Miskovsky / Solar Fields" },
            { path: "music/heat.mp3", title: "Heat", artist: "Solar Fields" },
            { path: "music/menu-theme.mp3", title: "Menu Theme", artist: "Solar Fields" }
        ];

        const audio = document.getElementById("loading-music");
        let lastTrackIndex = -1;
        let audioCtx, analyser, source, bufferLength, dataArray;
        let isAudioSetup = false;

        function initAudioReactor() {
            if (isAudioSetup) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioSetup = true;
                
                // Falls der Context wegen fehlender Interaktion auf "suspended" steht
                if (audioCtx.state === 'suspended') {
                    console.log("AudioContext is suspended. Warten auf Benutzerklick...");
                } else {
                    renderAudioReaction();
                }
            } catch(e) { 
                console.log("Audio API konnte nicht aufgebaut werden.", e); 
            }
        }

        function playRandomSong() {
            if (playlist.length === 0) return;
            let newIndex = lastTrackIndex;
            if (playlist.length > 1) {
                while (newIndex === lastTrackIndex) {
                    newIndex = Math.floor(Math.random() * playlist.length);
                }
            } else { newIndex = 0; }
            
            lastTrackIndex = newIndex;
            const currentSong = playlist[newIndex];
            
            // DOM Update VOR dem Abspielen forcieren, um "Warte..." sicher zu entfernen
            document.getElementById("track-title").innerText = currentSong.title;
            document.getElementById("track-artist").innerText = currentSong.artist;
            document.getElementById("track-progress").style.width = "0%";
            
            audio.src = currentSong.path;
            audio.volume = 0.15; 
            
            audio.play().then(() => { 
                initAudioReactor(); 
            }).catch(e => {
                console.log("Browser hat Autoplay blockiert. Ein Klick auf die Seite startet die Musik.");
            });
        }

        function renderAudioReaction() {
            if (!isAudioSetup || audioCtx.state === 'suspended') return;
            requestAnimationFrame(renderAudioReaction);
            
            analyser.getByteFrequencyData(dataArray);
            let bass = 0;
            for(let i = 0; i < 4; i++) { bass += dataArray[i]; }
            bass = bass / 4;
            document.body.style.setProperty('--audio-bass', bass / 255);

            const canvas = document.getElementById("vis-canvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = (canvas.width / bufferLength) * 1.4;
            let barHeight, x = 0;
            for(let i = 0; i < bufferLength; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height;
                let grad = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                grad.addColorStop(0, 'rgba(0, 119, 182, 0.8)');
                grad.addColorStop(0.6, 'rgba(0, 242, 254, 0.9)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0.9)');
                ctx.fillStyle = grad;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 3, barHeight);
                x += barWidth;
            }
        }

        // Benutzerinteraktion fängt Autoplay-Blockaden und suspensed AudioContexts auf
        window.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => console.log(e));
            }
            if(audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    renderAudioReaction();
                });
            } else {
                initAudioReactor();
            }
        });

        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                document.getElementById("track-progress").style.width = ((audio.currentTime / audio.duration) * 100) + "%";
            }
        });
        
        audio.addEventListener('ended', playRandomSong);
        
        // Initialer Startschuss
        playRandomSong();

        // ----------------------------------------------------
        // GMOD LADEBALKEN (STEAMCMD SYNC)
        // ----------------------------------------------------
        let totalFiles = 0, neededFiles = 0;
        function SetStatusChanged(status) { document.getElementById("status-text").innerText = status; }
        function SetFilesTotal(total) { if (total > totalFiles) totalFiles = total; }
        function SetFilesNeeded(needed) {
            neededFiles = needed;
            if (neededFiles > totalFiles) totalFiles = neededFiles;
            if (totalFiles > 0) {
                let percentage = Math.max(0, Math.min(100, ((totalFiles - neededFiles) / totalFiles) * 100));
                document.getElementById("load-progress").style.width = percentage + "%";
            }
        }
        function DownloadingFile(fileName) { document.getElementById("current-file").innerText = "Datenstrom: " + fileName; }
    </script>
</body>
</html>
