<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <link rel="stylesheet" type="text/css" href="loading.css" />
</head>
<body>

    <div id="background-blur"></div>

    <div class="layout-wrapper">
        <div class="main-panel">
            <div class="content-row">
                
                <div class="section server-section">
                    <img id="mapIcon" src="asset://mapimage/invalid_map" alt="Map" />
                    <div class="info-block">
                        <h3>Server Informationen:</h3>
                        <ul>
                            <li id="serverName">Name: Lade...</li>
                            <li id="serverUrl">URL: Lade...</li>
                            <li id="mapName">Map: Lade...</li>
                            <li id="maxPlayers">Slots: Lade...</li>
                        </ul>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="section player-section">
                    <img id="playerAvatar" src="https://via.placeholder.com/128?text=?" alt="Avatar" />
                    <div class="info-block">
                        <h3>Informationen über den Spieler:</h3>
                        <ul>
                            <li id="playerName">Nutzername: Lade...</li>
                        </ul>
                    </div>
                </div>

            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="progressText">Lade Spieldateien...</div>
        </div>

        <div class="splash-box" id="splashText">
            Bereite alles vor...
        </div>

        <div class="memorial-box">
            In Gedenken an Viktor Antonov, dem Art Director für die Half-Life 2 Reihe
        </div>
    </div>

    <script type="text/javascript">
        // Splash Text Rotation
        const splashTexts = [
            "Bereinige Blutflecken",
            "Lade noch mehr Ladebildschirme herunter...",
            "Dividiere durch Null...",
            "Befülle die Badewannen mit Melonen...",
            "Schmiere die Gravity Gun...",
            "Warte auf den G-Man..."
			"Verstecke Patronenhülsen..."
        ];
        
        let splashIndex = 0;
        setInterval(() => {
            splashIndex = (splashIndex + 1) % splashTexts.length;
            const splashEl = document.getElementById("splashText");
            splashEl.style.opacity = 0; // Fade out
            setTimeout(() => {
                splashEl.innerText = splashTexts[splashIndex];
                splashEl.style.opacity = 1; // Fade in
            }, 500);
        }, 4000);

        // GMod Hook: Initialisiert Server- und Spielerdaten
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang, gamemodeNice ) {
            // Server Infos setzen
            document.getElementById("serverName").innerText = "- Name: " + servername;
            document.getElementById("serverUrl").innerText = "- URL: " + (serverurl ? serverurl : "Nicht verfügbar");
            document.getElementById("mapName").innerText = "- Map: " + mapname;
            document.getElementById("maxPlayers").innerText = "- Maximale Spieler: " + maxplayers;
            
            // Map Bilder
            const mapImg = "asset://mapimage/" + mapname;
            document.getElementById("mapIcon").src = mapImg;
            document.body.style.backgroundImage = "url('" + mapImg + "')";

            // Spieler Infos via PlayerDB abfragen
            if (steamid) {
                fetch(`https://playerdb.co/api/player/steam/${steamid}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === "player_found") {
                            const player = data.data.player;
                            document.getElementById("playerName").innerText = "- Nutzername: " + player.username;
                            document.getElementById("playerAvatar").src = player.avatar;
                        } else {
                            document.getElementById("playerName").innerText = "- Nutzername: Unbekannt";
                        }
                    })
                    .catch(err => {
                        console.error("PlayerDB API Fehler:", err);
                        document.getElementById("playerName").innerText = "- Nutzername: Fehler beim Laden";
                    });
            }
        }

        // Ladebalken Logik (GMod native Aufrufe)
        let filesTotal = 0;
        let filesNeeded = 0;

        function SetFilesTotal( total ) {
            filesTotal = total;
        }

        function SetFilesNeeded( needed ) {
            filesNeeded = needed;
            UpdateProgress();
        }

        function DownloadingFile( fileName ) {
            document.getElementById("progressText").innerText = "Lade Datei: " + fileName;
        }

        function SetStatusChanged( status ) {
            document.getElementById("progressText").innerText = status;
        }

        function UpdateProgress() {
            if (filesTotal > 0) {
                let percentage = ((filesTotal - filesNeeded) / filesTotal) * 100;
                document.getElementById("progressBar").style.width = percentage + "%";
            }
        }
    </script>

</body>
</html>
