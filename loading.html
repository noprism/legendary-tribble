<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <link rel="stylesheet" href="loading.css">
</head>
<body>

<div id="background_layer"></div>

<div class="main-wrapper">
    <div class="hero-section">
        <img id="logo" src="https://github.com/noprism/legendary-tribble/blob/main/loading.png?raw=true" alt="Logo"/>
        <div class="spinner-container">
            <div class="glass-spinner"></div>
        </div>
        <h1 id="status">Connecting.</h1>
    </div>

    <div class="server_info">
        <div class="map-preview-container">
            <img id="mapimg" src="asset://mapimage/invalid_map" />
        </div>
        
        <div class="content-split">
            <div class="primary-info">
                <div id="serverName">Loading server...</div>
                <div class="sub-tags">
                    <span id="serverMap">Map</span>
                    <span class="separator">•</span>
                    <span id="serverGamemode">Gamemode</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="label">Slots</span>
                    <span id="maxPlayers" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Region</span>
                    <span id="serverLang" class="value">-</span>
                </div>
                <div class="stat-item">
                    <span class="label">SteamID</span>
                    <span id="userSteamID" class="value">-</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* GMod Callback */
function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang, gamemodeNice) {
    const mapImg = "asset://mapimage/" + mapname;

    // Setting text
    document.getElementById("serverName").innerText = servername;
    document.getElementById("serverMap").innerText = mapname;
    document.getElementById("serverGamemode").innerText = gamemodeNice || gamemode;
    document.getElementById("maxPlayers").innerText = maxplayers;
    document.getElementById("serverLang").innerText = (lang ? lang.toUpperCase() : "DE");
    document.getElementById("userSteamID").innerText = steamid;

    // Icons and Background
    document.getElementById("mapimg").src = mapImg;
    document.getElementById("background_layer").style.backgroundImage = `url('${mapImg}')`;

    // Fetching player data by SteamAPI
    if (steamid && steamid !== "%steamid%") { // Check against placeholder
        fetch(`https://playerdb.co/api/player/steam/${steamid}`)
            .then(response => response.json())
            .then(data => {
                if(data.success && data.data.player) {
                    const player = data.data.player;
                    // Replacing user pfp
                    const avatarUrl = player.avatar;
                    const logoEl = document.getElementById("logo");
                    logoEl.src = avatarUrl;
                    logoEl.classList.add("avatar-style"); // Style for pfp
                    
                    // Personalizing status-text
                    document.getElementById("status").innerText = `Welcome, ${player.username}!`;
                }
            })
            .catch(err => console.error("Error fetching data:", err));
    }

    // Trigger animation
    setTimeout(() => {
        document.querySelector(".server_info").classList.add("visible");
    }, 100);
}

/* Status update (handled by GMod) */
function SetStatusChanged(status) {
    // If we didn't fetch a name yet, we use the default placeholder
    // Otherwise, we'll keep the greeting or append the status
    const statusEl = document.getElementById("status");
    if(!statusEl.innerText.includes("Willkommen")) {
        statusEl.innerText = status;
    }
}
</script>

</body>
</html>
